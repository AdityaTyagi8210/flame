version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend-Java
      dockerfile: Dockerfile
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/moviedb
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - API_KEY=${API_KEY:-your_omdb_api_key}
    restart: on-failure

volumes:
  mongo_data:
    driver: local
